spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fk?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: ${JWT_SECRET:backend-travel-reimburse-jwt-secret-change-me-2026}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:7200}
